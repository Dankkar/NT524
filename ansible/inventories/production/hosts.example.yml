---
all:
  children:
    vpn_gateways:
      children:
        aws_vpn:
          hosts:
            aws-vpn:
              ansible_host: CHANGE_ME_AWS_VPN_PUBLIC_IP
              ansible_user: ubuntu
              wireguard_address: 10.200.0.1
              wireguard_peer_host: openstack-vpn
              wireguard_peer_allowed_ips:
                - 10.200.0.2/32
                - "{{ openstack_app_cidr }}"
        openstack_vpn:
          hosts:
            openstack-vpn:
              ansible_host: CHANGE_ME_OPENSTACK_VPN_FLOATING_IP
              ansible_user: ubuntu
              wireguard_endpoint: ""
              wireguard_address: 10.200.0.2
              wireguard_peer_host: aws-vpn
              wireguard_peer_allowed_ips:
                - 10.200.0.1/32
                - "{{ aws_vpc_cidr }}"
    waf_nodes:
      children:
        aws_waf:
          hosts:
            aws-waf:
              ansible_host: CHANGE_ME_AWS_WAF_PRIVATE_IP
              ansible_user: ubuntu
              app_backend_host: CHANGE_ME_AWS_APP_PRIVATE_IP
              ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand='ssh -i ~/.ssh/aws_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@CHANGE_ME_AWS_GATEWAY_PUBLIC_IP'"
        openstack_waf:
          hosts:
            openstack-waf:
              ansible_host: CHANGE_ME_OPENSTACK_WAF_PRIVATE_IP
              ansible_user: ubuntu
              app_backend_host: CHANGE_ME_OPENSTACK_APP_PRIVATE_IP
              ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand='ssh -i ~/.ssh/openstack_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@CHANGE_ME_OPENSTACK_VPN_FLOATING_IP'"
    gateway_nodes:
      hosts:
        aws-gateway:
          ansible_host: CHANGE_ME_AWS_GATEWAY_PUBLIC_IP
          ansible_user: ubuntu
          gateway_upstream_host: CHANGE_ME_AWS_WAF_PRIVATE_IP
          gateway_upstream_port: 80
        openstack-gateway:
          ansible_host: CHANGE_ME_OPENSTACK_VPN_FLOATING_IP
          ansible_user: ubuntu
          gateway_upstream_host: CHANGE_ME_OPENSTACK_WAF_PRIVATE_IP
          gateway_upstream_port: 80
    app_nodes:
      hosts:
        aws-app:
          ansible_host: CHANGE_ME_AWS_APP_PUBLIC_IP
          ansible_user: ubuntu
          aws_app_private_ip: CHANGE_ME_AWS_APP_PRIVATE_IP
        openstack-app:
          ansible_host: CHANGE_ME_OPENSTACK_APP_PRIVATE_IP
          ansible_user: ubuntu
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand='ssh -i ~/.ssh/openstack_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@CHANGE_ME_OPENSTACK_VPN_FLOATING_IP'"
    db_nodes:
      hosts:
        openstack-db:
          ansible_host: CHANGE_ME_OPENSTACK_DB_PRIVATE_IP
          ansible_user: ubuntu
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand='ssh -i ~/.ssh/openstack_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@CHANGE_ME_OPENSTACK_VPN_FLOATING_IP'"
