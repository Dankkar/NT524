---
- name: Wait for apt/dpkg locks
  ansible.builtin.shell: >-
    timeout 600 bash -c
    'while command -v fuser >/dev/null 2>&1 &&
    fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock
    /var/cache/apt/archives/lock /var/lib/apt/lists/lock >/dev/null 2>&1;
    do sleep 5; done'
  args:
    executable: /bin/bash
  changed_when: false

- name: Force apt to use IPv4
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99force-ipv4
    content: 'Acquire::ForceIPv4 "true";'
    owner: root
    group: root
    mode: "0644"

- name: Check Filebeat CLI
  ansible.builtin.command: filebeat version
  register: filebeat_cli_check
  changed_when: false
  failed_when: false

- name: Install Filebeat repository dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
    lock_timeout: 600
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: filebeat_cli_check.rc != 0

- name: Check Elastic package signing key
  ansible.builtin.stat:
    path: /usr/share/keyrings/elasticsearch-keyring.asc
  register: elastic_keyring_stat

- name: Install Elastic package signing key
  ansible.builtin.get_url:
    url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
    dest: /usr/share/keyrings/elasticsearch-keyring.asc
    owner: root
    group: root
    mode: "0644"
  when:
    - filebeat_cli_check.rc != 0
    - not elastic_keyring_stat.stat.exists

- name: Configure Elastic APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.asc] https://artifacts.elastic.co/packages/{{ elastic_stack_major_version }}/apt stable main"
    filename: "elastic-{{ elastic_stack_major_version }}"
    state: present
    update_cache: true
  when: filebeat_cli_check.rc != 0

- name: Install Filebeat
  ansible.builtin.apt:
    name: filebeat
    state: present
    lock_timeout: 600
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: filebeat_cli_check.rc != 0

- name: Configure Filebeat
  ansible.builtin.template:
    src: filebeat.yml.j2
    dest: /etc/filebeat/filebeat.yml
    owner: root
    group: root
    mode: "0600"
  notify: Restart Filebeat

- name: Enable Filebeat service
  ansible.builtin.systemd:
    name: filebeat
    enabled: "{{ filebeat_service_enabled | bool }}"
    state: "{{ 'started' if filebeat_service_enabled | bool else 'stopped' }}"
