---
- name: Wait for cloud-init to finish
  ansible.builtin.shell: >-
    timeout 600 bash -c
    'if command -v cloud-init >/dev/null 2>&1; then
    cloud-init status --wait || cloud-init status | grep -q "status: error";
    fi'
  args:
    executable: /bin/bash
  changed_when: false

- name: Wait for apt/dpkg locks
  ansible.builtin.shell: >-
    timeout 600 bash -c
    'while command -v fuser >/dev/null 2>&1 &&
    fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock
    /var/cache/apt/archives/lock /var/lib/apt/lists/lock >/dev/null 2>&1;
    do sleep 5; done'
  args:
    executable: /bin/bash
  changed_when: false

- name: Force apt to use IPv4
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99force-ipv4
    content: 'Acquire::ForceIPv4 "true";'
    owner: root
    group: root
    mode: "0644"

- name: Configure static DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 8.8.8.8
      nameserver 1.1.1.1
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
    state: present
    update_cache: true
    lock_timeout: 600
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Enable Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create Docker config directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Docker daemon DNS
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "dns": ["8.8.8.8", "1.1.1.1"]
      }
    owner: root
    group: root
    mode: "0644"
  register: docker_daemon_config

- name: Restart Docker after daemon config change
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: docker_daemon_config.changed

- name: Pull Juice Shop image
  ansible.builtin.command: "docker pull {{ juice_shop_image }}"
  register: juice_shop_pull
  changed_when: "'Downloaded newer image' in juice_shop_pull.stdout or 'Pull complete' in juice_shop_pull.stdout"

- name: Inspect Juice Shop container
  ansible.builtin.command: "docker inspect {{ juice_shop_container_name }}"
  register: juice_shop_inspect
  changed_when: false
  failed_when: juice_shop_inspect.rc not in [0, 1]

- name: Start Juice Shop container
  ansible.builtin.command: >-
    docker run -d
    --name {{ juice_shop_container_name }}
    --restart unless-stopped
    -p {{ juice_shop_host_port }}:{{ juice_shop_container_port }}
    {{ juice_shop_image }}
  register: juice_shop_run
  when: juice_shop_inspect.rc != 0

- name: Ensure Juice Shop container is running
  ansible.builtin.command: "docker start {{ juice_shop_container_name }}"
  register: juice_shop_start
  changed_when: "'{{ juice_shop_container_name }}' in juice_shop_start.stdout"
  when: juice_shop_inspect.rc == 0
